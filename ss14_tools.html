<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS14 Tools — Goob Station</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0f;--bg2:#141417;--bg3:#1a1a1e;--bg4:#20242b;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e8ec;--text2:#9090a0;--text3:#5a5a6a;
  --red:#c0392b;--red-l:#e74c3c;--red-d:rgba(192,57,43,0.15);
  --green:#1e8449;--green-l:#27ae60;--green-d:rgba(30,132,73,0.15);
  --blue:#2471a3;--blue-l:#3498db;--blue-d:rgba(36,113,163,0.15);
  --amber:#d4820a;--amber-l:#f39c12;--amber-d:rgba(212,130,10,0.15);
  --purple:#7d3c98;--purple-l:#9b59b6;--purple-d:rgba(125,60,152,0.15);
  --mono:'Share Tech Mono',monospace;--head:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:14px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.hlogo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;font-family:var(--head)}
.htitle{font-family:var(--head);font-size:20px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.hsub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.hnav{margin-left:auto;display:flex;gap:6px}
.hnav-btn{font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:5px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;letter-spacing:.05em;transition:all .15s}
.hnav-btn:hover{color:var(--text2);background:rgba(255,255,255,.04)}
.hnav-btn.active{color:#fff;border-color:transparent}

/* ── PAGES ── */
.page{display:none;flex:1;overflow:hidden}
.page.active{display:flex;flex-direction:column}

/* ════════════════════════════════
   SENTENCE CALCULATOR
════════════════════════════════ */
.sc-body{display:grid;grid-template-columns:1fr 310px;flex:1;overflow:hidden}
.sc-left{padding:18px 22px;overflow-y:auto}
.sc-right{padding:16px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;gap:12px;overflow-y:auto}

/* server tabs inside sc */
.srv-tabs{display:flex;gap:6px;margin-bottom:16px}
.srv-tab{font-family:var(--mono);font-size:11px;padding:5px 13px;border-radius:4px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;letter-spacing:.05em;transition:all .15s}
.srv-tab:hover{color:var(--text2)}
.srv-tab.active{border-color:rgba(192,57,43,.45);color:var(--red-l);background:var(--red-d)}

.tier-block{margin-bottom:16px}
.tier-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;border-radius:6px 6px 0 0;border:1px solid;border-bottom:none;font-family:var(--head);font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.th-max{font-family:var(--mono);font-size:11px;opacity:.65}
.crime-btns{border:1px solid;border-radius:0 0 6px 6px;overflow:hidden}
.cbtn{display:flex;align-items:center;width:100%;background:var(--bg3);border:none;border-bottom:1px solid var(--border);cursor:pointer;padding:0;transition:background .1s}
.cbtn:last-child{border-bottom:none}
.cbtn:hover:not(.on):not(.lk){background:rgba(255,255,255,.04)}
.cbtn.on{background:rgba(192,57,43,.12)}
.cbtn.lk{opacity:.36;cursor:not-allowed}
.cchk{width:36px;min-width:36px;align-self:stretch;min-height:38px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);border-right:1px solid var(--border);background:var(--bg2);transition:all .1s}
.cbtn.on .cchk{background:var(--red);color:#fff}
.ccode{font-family:var(--mono);font-size:11px;color:var(--text3);padding:9px 9px;min-width:72px}
.cname{font-size:13px;color:var(--text);flex:1;padding:9px 4px;text-align:left;line-height:1.3}
.ctime{font-family:var(--mono);font-size:12px;color:var(--text2);padding:9px 12px;white-space:nowrap}
.ctag{font-size:10px;font-family:var(--mono);padding:2px 5px;border-radius:3px;margin-left:5px;font-weight:600;vertical-align:middle}
.tlink{background:rgba(150,100,220,.15);color:#c5a3ff;border:1px solid rgba(150,100,220,.3)}
.twarn{background:var(--amber-d);color:var(--amber-l);border:1px solid rgba(212,130,10,.3)}
.tcap{background:var(--red-d);color:var(--red-l);border:1px solid rgba(192,57,43,.35)}
.twip{background:rgba(100,100,150,.15);color:#9090c0;border:1px solid rgba(100,100,180,.3)}
.t1 .tier-hdr{background:rgba(39,174,96,.1);border-color:rgba(39,174,96,.3);color:#2ecc71}.t1 .crime-btns{border-color:rgba(39,174,96,.2)}
.t2 .tier-hdr{background:rgba(243,156,18,.1);border-color:rgba(243,156,18,.3);color:#f39c12}.t2 .crime-btns{border-color:rgba(243,156,18,.2)}
.t3 .tier-hdr{background:rgba(230,126,34,.1);border-color:rgba(230,126,34,.3);color:#e67e22}.t3 .crime-btns{border-color:rgba(230,126,34,.2)}
.t4 .tier-hdr{background:rgba(231,76,60,.1);border-color:rgba(231,76,60,.3);color:#e74c3c}.t4 .crime-btns{border-color:rgba(231,76,60,.2)}
.t5 .tier-hdr{background:rgba(192,57,43,.22);border-color:rgba(192,57,43,.45);color:#ff6b6b}.t5 .crime-btns{border-color:rgba(192,57,43,.3)}

.verdict{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:18px;text-align:center}
.v-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.v-srv{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:8px}
.v-time{font-family:var(--head);font-size:60px;font-weight:800;line-height:1;color:var(--text);transition:color .2s}
.v-time.cap{color:var(--red-l);font-size:32px}
.v-time.capped{color:var(--amber-l)}
.v-time.perma{color:var(--red-l)}
.v-unit{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:4px}
.v-note{font-size:11px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.6}
.chbox{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.chbox-t{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.ch-empty{padding:12px;font-size:12px;color:var(--text3);font-family:var(--mono);text-align:center}
.ch-row{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.ch-row:last-child{border-bottom:none}
.ch-row.dr{opacity:.38}
.ch-n{color:var(--text2);flex:1}
.ch-v{font-family:var(--mono);font-size:12px;color:var(--text);white-space:nowrap}
.ch-tot{display:flex;justify-content:space-between;padding:7px 12px;background:rgba(0,0,0,.2);font-family:var(--mono);font-size:12px;border-top:1px solid var(--border)}
.ch-tot .tl{color:var(--text3)}.ch-tot .tv{color:var(--amber-l)}
.wbox{background:var(--amber-d);border:1px solid rgba(212,130,10,.25);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--amber-l);line-height:1.5}
.wbox.info{background:var(--red-d);border-color:rgba(192,57,43,.25);color:var(--red-l)}
.clrbtn{width:100%;background:none;border:1px solid var(--border2);border-radius:6px;padding:8px;font-family:var(--mono);font-size:12px;color:var(--text3);cursor:pointer;letter-spacing:.06em;transition:all .12s;text-transform:uppercase;margin-top:auto}
.clrbtn:hover{border-color:var(--red-l);color:var(--red-l);background:var(--red-d)}

/* ════════════════════════════════
   CHEMISTRY CALCULATOR
════════════════════════════════ */
.chem-wrap{display:grid;grid-template-columns:320px 1fr;flex:1;overflow:hidden}
.chem-left{background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.chem-right{display:flex;flex-direction:column;overflow:hidden}

.chem-search-wrap{padding:14px 16px;border-bottom:1px solid var(--border)}
.chem-search{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;font-size:13px;font-family:var(--body);color:var(--text);outline:none;transition:border-color .15s}
.chem-search:focus{border-color:rgba(39,174,96,.4)}
.chem-search::placeholder{color:var(--text3)}

.chem-filter{display:flex;gap:4px;padding:8px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.cf-btn{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;letter-spacing:.04em;transition:all .12s}
.cf-btn:hover{color:var(--text2)}
.cf-btn.active{color:#fff;border-color:transparent}
.cf-all.active{background:#444}
.cf-med.active{background:var(--green)}
.cf-tox.active{background:var(--red)}
.cf-narc.active{background:var(--purple)}
.cf-pyro.active{background:var(--amber)}
.cf-misc.active{background:var(--blue)}

.chem-list{flex:1;overflow-y:auto}
.chem-item{padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:10px}
.chem-item:hover{background:rgba(255,255,255,.04)}
.chem-item.selected{background:var(--green-d);border-left:3px solid var(--green-l)}
.ci-name{font-size:13px;color:var(--text);flex:1}
.ci-cat{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:3px;font-weight:600}
.cat-med{background:var(--green-d);color:var(--green-l);border:1px solid rgba(39,174,96,.3)}
.cat-tox{background:var(--red-d);color:var(--red-l);border:1px solid rgba(192,57,43,.3)}
.cat-narc{background:var(--purple-d);color:var(--purple-l);border:1px solid rgba(125,60,152,.3)}
.cat-pyro{background:var(--amber-d);color:var(--amber-l);border:1px solid rgba(212,130,10,.3)}
.cat-misc{background:var(--blue-d);color:var(--blue-l);border:1px solid rgba(36,113,163,.3)}
.ci-empty{padding:20px 16px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text3)}

/* Detail panel */
.chem-detail{flex:1;overflow-y:auto;padding:20px 24px}
.cd-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);font-family:var(--mono);font-size:13px;gap:8px}
.cd-name{font-family:var(--head);font-size:28px;font-weight:800;letter-spacing:.03em;margin-bottom:4px}
.cd-meta{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:18px;display:flex;gap:12px;flex-wrap:wrap}
.cd-meta span{display:flex;align-items:center;gap:4px}

.cd-section{margin-bottom:18px}
.cd-section-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* Recipe tree */
.recipe-tree{display:flex;flex-direction:column;gap:6px}
.rt-row{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border)}
.rt-row.intermediate{border-left:3px solid var(--amber-l)}
.rt-arrow{color:var(--text3);font-size:12px;font-family:var(--mono)}
.rt-name{font-size:13px;color:var(--text);flex:1}
.rt-amt{font-family:var(--mono);font-size:12px;color:var(--text2)}
.rt-note{font-size:11px;color:var(--amber-l);font-family:var(--mono)}

/* Base elements */
.base-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.base-item{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;display:flex;flex-direction:column;gap:3px}
.base-item.dispenser{border-color:rgba(39,174,96,.3)}
.base-item.not-dispenser{border-color:rgba(192,57,43,.3)}
.bi-name{font-size:13px;font-weight:600;color:var(--text)}
.bi-amt{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--green-l)}
.bi-src{font-size:10px;font-family:var(--mono);color:var(--text3)}
.base-item.not-dispenser .bi-src{color:var(--red-l)}

/* Effects */
.effects-list{display:flex;flex-direction:column;gap:4px}
.eff-row{font-size:13px;padding:4px 0}
.eff-heal{color:var(--green-l)}
.eff-dmg{color:var(--red-l)}
.eff-misc{color:var(--text2)}
.od-box{background:var(--red-d);border:1px solid rgba(192,57,43,.3);border-radius:6px;padding:8px 12px;font-size:12px;font-family:var(--mono);color:var(--red-l);margin-top:6px}
.heat-box{background:var(--amber-d);border:1px solid rgba(212,130,10,.3);border-radius:6px;padding:8px 12px;font-size:12px;font-family:var(--mono);color:var(--amber-l);margin-top:6px}

::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:700px){
  .sc-body{grid-template-columns:1fr}
  .sc-right{border-left:none;border-top:1px solid var(--border)}
  .chem-wrap{grid-template-columns:1fr}
  .chem-left{max-height:40vh}
  .hnav-btn span{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="hlogo" style="background:linear-gradient(135deg,#c0392b,#8e44ad)">G</div>
  <div>
    <div class="htitle">Goob Station Tools</div>
    <div class="hsub">SS14 // Security &amp; Chemistry</div>
  </div>
  <div class="hnav">
    <button class="hnav-btn active" id="nav-sc" onclick="showPage('sc')" style="--ac:var(--red-l)" >⚖ <span>Sentences</span></button>
    <button class="hnav-btn" id="nav-chem" onclick="showPage('chem')">⚗ <span>Chemistry</span></button>
  </div>
</div>

<!-- ══════════════════════════════════
     PAGE: SENTENCE CALCULATOR
══════════════════════════════════ -->
<div class="page active" id="page-sc">
  <div class="sc-body">
    <div class="sc-left">
      <div class="srv-tabs" id="srv-tabs"></div>
      <div id="sc-panels"></div>
    </div>
    <div class="sc-right">
      <div class="verdict">
        <div class="v-label">Final Sentence</div>
        <div class="v-srv" id="v-srv"></div>
        <div class="v-time" id="v-time">—</div>
        <div class="v-unit" id="v-unit">no charges selected</div>
        <div class="v-note" id="v-note" style="display:none"></div>
      </div>
      <div class="chbox">
        <div class="chbox-t">Active charges (<span id="ch-count">0</span>)</div>
        <div id="ch-list"><div class="ch-empty">// none selected</div></div>
      </div>
      <div id="sc-warns" style="display:flex;flex-direction:column;gap:8px"></div>
      <button class="clrbtn" onclick="scClearAll()">⟳ Clear All</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     PAGE: CHEMISTRY CALCULATOR
══════════════════════════════════ -->
<div class="page" id="page-chem">
  <div class="chem-wrap">
    <div class="chem-left">
      <div class="chem-search-wrap">
        <input class="chem-search" id="chem-search" type="text" placeholder="Search substances..." oninput="renderChemList()">
      </div>
      <div class="chem-filter">
        <button class="cf-btn cf-all active" onclick="setChemFilter('all',this)">All</button>
        <button class="cf-btn cf-med" onclick="setChemFilter('med',this)">Med</button>
        <button class="cf-btn cf-tox" onclick="setChemFilter('tox',this)">Toxin</button>
        <button class="cf-btn cf-narc" onclick="setChemFilter('narc',this)">Narc</button>
        <button class="cf-btn cf-pyro" onclick="setChemFilter('pyro',this)">Pyro</button>
        <button class="cf-btn cf-misc" onclick="setChemFilter('misc',this)">Misc</button>
      </div>
      <div class="chem-list" id="chem-list"></div>
    </div>
    <div class="chem-right">
      <div class="chem-detail" id="chem-detail">
        <div class="cd-empty">
          <div style="font-size:28px">⚗</div>
          <div>Select a substance to see its recipe breakdown</div>
          <div style="font-size:11px;color:var(--text3)">Shows base elements needed from the dispenser</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  PAGE NAVIGATION
// ══════════════════════════════════════════
const PAGE_COLORS = { sc: '#e74c3c', chem: '#27ae60' };
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.hnav-btn').forEach(b => { b.classList.remove('active'); b.style.background=''; b.style.color=''; b.style.borderColor=''; });
  document.getElementById('page-' + id).classList.add('active');
  const btn = document.getElementById('nav-' + id);
  btn.classList.add('active');
  const c = PAGE_COLORS[id];
  btn.style.background = c + '22';
  btn.style.color = c;
  btn.style.borderColor = c + '88';
}

// ══════════════════════════════════════════
//  SENTENCE CALCULATOR DATA
// ══════════════════════════════════════════
const SC_SERVERS = {
  goob:{name:"Goob Station",color:"#e74c3c",capNote:"Requires Captain approval. Exception: V-III — no Captain needed.",maxBrig:10,

    crimes:[
      {code:"I-I",name:"Disturbance",tier:1,mins:2,linked:null,capital:false},
      {code:"I-II",name:"Petty Theft",tier:1,mins:3,linked:null,capital:false},
      {code:"I-III",name:"Possession / Use of Illegal Substances",tier:1,mins:3,linked:null,capital:false},
      {code:"I-IV",name:"Trespass",tier:1,mins:2,linked:null,capital:false},
      {code:"I-V",name:"Vandalism",tier:1,mins:2,linked:null,capital:false},
      {code:"II-I",name:"Animal Cruelty",tier:2,mins:3,linked:null,capital:false},
      {code:"II-II",name:"Damage / Destruction of Property",tier:2,mins:4,linked:null,capital:false},
      {code:"II-III",name:"Endangerment",tier:2,mins:4,linked:null,capital:false},
      {code:"II-IV",name:"Failure to Comply",tier:2,mins:2,linked:null,capital:false},
      {code:"II-V",name:"Possession of Restricted Gear",tier:2,mins:5,linked:null,capital:false},
      {code:"II-VI",name:"Rioting",tier:2,mins:4,linked:null,capital:false},
      {code:"III-I",name:"Assault / Battery",tier:3,mins:6,linked:"assault",capital:false},
      {code:"III-II",name:"Breach of Arrest",tier:3,mins:4,linked:null,capital:false},
      {code:"III-III",name:"Grand Theft",tier:3,mins:6,linked:null,capital:false},
      {code:"III-IV",name:"Manslaughter",tier:3,mins:8,linked:"assault",capital:false},
      {code:"III-V",name:"Mass Destruction",tier:3,mins:10,linked:null,capital:false},
      {code:"III-VI",name:"Possession of Restricted Weaponry",tier:3,mins:6,linked:null,capital:false},
      {code:"III-VII",name:"Secure Trespass",tier:3,mins:6,linked:null,capital:false},
      {code:"III-VIII",name:"Breach of Custody",tier:3,mins:5,linked:null,capital:false},
      {code:"IV-I",name:"Attempted Murder",tier:4,mins:10,linked:"murder",capital:false,lenient:true},
      {code:"IV-II",name:"Unlawful Control / Kidnapping",tier:4,mins:10,linked:null,capital:false},
      {code:"IV-III",name:"Murder",tier:4,mins:10,linked:"murder",capital:false,perma:true},
      {code:"V-I",name:"Mass Murder",tier:5,mins:0,linked:null,capital:true},
      {code:"V-II",name:"Prevention of Revival",tier:5,mins:0,linked:null,capital:true},
      {code:"V-III",name:"Refusal of Mental Shielding",tier:5,mins:0,linked:null,capital:true,noCapt:true},
      {code:"V-IV",name:"Terrorism",tier:5,mins:0,linked:null,capital:true},

let scServer = 'goob', scSel = new Set();
function scId(c){return 's'+c.replace(/[^a-zA-Z0-9]/g,'_')}

function buildSrvTabs(){
  document.getElementById('srv-tabs').innerHTML = Object.entries(SC_SERVERS).map(([k,v])=>
    `<button class="srv-tab${k===scServer?' active':''}" onclick="scSwitch('${k}')">${v.name}</button>`
  ).join('');
}

function scSwitch(k){scServer=k;scSel.clear();buildSrvTabs();buildScPanels();scRender()}

function buildScPanels(){
  const s=SC_SERVERS[scServer];
  document.getElementById('sc-panels').innerHTML=s.tiers.map(t=>{
    const crimes=s.crimes.filter(c=>c.tier===t.n);
    return `<div class="tier-block ${t.c}">
      <div class="tier-hdr"><span>${t.l}</span><span class="th-max">${t.m}</span></div>
      <div class="crime-btns">${crimes.map(c=>{
        const ts=c.capital?"CAPITAL":c.asNeeded?"as needed":c.rangeMax?`${c.mins}–${c.rangeMax} min`:`${c.mins} min`;
        const tags=[c.linked?`<span class="ctag tlink">LINKED</span>`:'',c.lenient?`<span class="ctag twarn">LENIENT</span>`:'',c.noCapt?`<span class="ctag twarn">NO CAPT.</span>`:'',c.capital?`<span class="ctag tcap">CAPITAL</span>`:'',c.wip?`<span class="ctag twip">WIP</span>`:''].join('');
        return `<button class="cbtn" id="btn-${scId(c.code)}" onclick="scToggle('${c.code}')">
          <span class="cchk" id="chk-${scId(c.code)}">○</span>
          <span class="ccode">${c.code}</span>
          <span class="cname">${c.name}${tags}</span>
          <span class="ctime">${ts}</span>
        </button>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function scToggle(code){if(scSel.has(code))scSel.delete(code);else scSel.add(code);scRender()}
function scClearAll(){scSel.clear();scRender()}

function scRender(){
  const s=SC_SERVERS[scServer];
  const charges=s.crimes.filter(c=>scSel.has(c.code));
  const dropped=new Set();
  const lg={};
  charges.filter(c=>c.linked).forEach(c=>{if(!lg[c.linked])lg[c.linked]=[];lg[c.linked].push(c)});
  Object.values(lg).forEach(g=>{if(g.length>1)[...g].sort((a,b)=>b.mins-a.mins).slice(1).forEach(c=>dropped.add(c.code))});
  const hasCap=charges.some(c=>c.capital);
  const active=charges.filter(c=>!c.capital&&!dropped.has(c.code)&&!c.asNeeded);
  const raw=active.reduce((sum,c)=>sum+c.mins,0);
  const capped=s.maxBrig<999&&raw>s.maxBrig;
  const final=hasCap?0:capped?s.maxBrig:raw;
  const hasPerma=charges.some(c=>c.perma&&!dropped.has(c.code));
  const hasAN=charges.some(c=>c.asNeeded&&!dropped.has(c.code));

  s.crimes.forEach(c=>{
    const btn=document.getElementById('btn-'+scId(c.code));
    const chk=document.getElementById('chk-'+scId(c.code));
    if(!btn)return;
    const on=scSel.has(c.code),lk=dropped.has(c.code);
    btn.className='cbtn'+(on&&!lk?' on':'')+(lk?' lk':'');
    chk.textContent=on?(lk?'✕':'●'):'○';
  });

  document.getElementById('ch-count').textContent=charges.length;
  document.getElementById('v-srv').textContent=s.name;
  const chlist=document.getElementById('ch-list');
  if(!charges.length){chlist.innerHTML='<div class="ch-empty">// none selected</div>';}
  else{
    const rows=charges.map(c=>{const dr=dropped.has(c.code);const tv=c.capital?'CAP':c.asNeeded?'var.':c.rangeMax?`${c.mins}–${c.rangeMax}m`:`${c.mins}m`;return`<div class="ch-row${dr?' dr':''}"><span class="ch-n">${c.code} — ${c.name}${dr?` <em style="color:var(--text3)">(overridden)</em>`:''}</span><span class="ch-v">${tv}</span></div>`;}).join('');
    const tot=(!hasCap&&active.length>1)?`<div class="ch-tot"><span class="tl">Raw total</span><span class="tv">${raw} min${capped?` → cap ${s.maxBrig}`:''}</span></div>`:'';
    chlist.innerHTML=rows+tot;
  }

  const vt=document.getElementById('v-time'),vu=document.getElementById('v-unit'),vn=document.getElementById('v-note');
  if(!charges.length){vt.textContent='—';vt.className='v-time';vu.textContent='no charges selected';vn.style.display='none';}
  else if(hasCap){vt.textContent='CAPITAL';vt.className='v-time cap';vu.textContent=scServer==='deltav'?'ext. confinement / execution':'execution';vn.textContent=s.capNote;vn.style.display='block';}
  else if(hasPerma){vt.textContent=final;vt.className='v-time perma';vu.textContent='min or PERMA — Warden\'s discretion';vn.textContent='Murder present. Warden may opt for permanent confinement.';vn.style.display='block';}
  else if(hasAN&&active.length===0){vt.textContent='VAR.';vt.className='v-time';vu.textContent='at officer\'s discretion';vn.style.display='none';}
  else{vt.textContent=final;vt.className='v-time'+(capped?' capped':'');vu.textContent='minute'+(final!==1?'s':'')+(capped?` (${s.maxBrig} min cap)`:'');vn.style.display='none';}

  const warns=[];
  Object.entries(lg).forEach(([g,arr])=>{if(arr.length>1){const k=[...arr].sort((a,b)=>b.mins-a.mins)[0];warns.push({t:'warn',m:`Linked crimes (${g}) — only "${k.name}" counted.`});}});
  if(capped&&!hasCap)warns.push({t:'warn',m:`Raw total ${raw} min — capped to ${s.maxBrig} min.`});
  if(hasCap)warns.push({t:'info',m:scServer==='deltav'?'Capital: Extended Confinement → Exfiltration → Execution (last resort).':'Capital offense. Execution requires Captain (except V-III).'});
  const wb=document.getElementById('sc-warns');
  wb.innerHTML=warns.map(w=>`<div class="wbox${w.t==='info'?' info':''}">${w.m}</div>`).join('');
  wb.style.display=warns.length?'flex':'none';
}

// ══════════════════════════════════════════
//  CHEMISTRY UI
// ══════════════════════════════════════════
let chemFilter = 'all';
let selectedChem = null;

const CAT_LABELS = {med:'MED',tox:'TOXIN',narc:'NARC',pyro:'PYRO',misc:'MISC'};
const CAT_CLS    = {med:'cat-med',tox:'cat-tox',narc:'cat-narc',pyro:'cat-pyro',misc:'cat-misc'};

function setChemFilter(f, btn) {
  chemFilter = f;
  document.querySelectorAll('.cf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChemList();
}

function renderChemList() {
  const q = document.getElementById('chem-search').value.toLowerCase().trim();
  // Deduplicate by id
  const seen = new Set();
  const items = CHEMS.filter(c => {
    if (seen.has(c.id)) return false;
    seen.add(c.id);
    const catMatch = chemFilter === 'all' || c.cat === chemFilter;
    const qMatch = !q || c.name.toLowerCase().includes(q) ||
      c.recipe.some(r => r.ing.toLowerCase().includes(q));
    return catMatch && qMatch;
  });

  const list = document.getElementById('chem-list');
  if (!items.length) { list.innerHTML = '<div class="ci-empty">// no results</div>'; return; }
  list.innerHTML = items.map(c => `
    <div class="chem-item${selectedChem===c.id?' selected':''}" onclick="selectChem('${c.id}')">
      <span class="ci-name">${c.name}</span>
      <span class="ci-cat ${CAT_CLS[c.cat]||'cat-misc'}">${CAT_LABELS[c.cat]||'MISC'}</span>
    </div>`).join('');
}

function selectChem(id) {
  selectedChem = id;
  renderChemList();
  const c = CHEMS.find(x => x.id === id);
  if (!c) return;
  renderChemDetail(c);
}

// Recursively flatten recipe to base elements
function flattenRecipe(chem, multiplier, visited) {
  if (!visited) visited = new Set();
  if (visited.has(chem.id)) return {};
  visited.add(chem.id);

  const result = {};
  for (const ing of chem.recipe) {
    if (ing.catalyst) continue; // catalysts not consumed
    const amt = ing.amt * multiplier;
    const sub = CHEMS.find(c => c.id === ing.ing || c.name.toLowerCase() === ing.ing.toLowerCase());
    if (sub && ing.inter && sub.recipe.length > 0) {
      const sub_result = flattenRecipe(sub, amt, new Set(visited));
      for (const [k, v] of Object.entries(sub_result)) {
        result[k] = (result[k] || 0) + v;
      }
    } else {
      const key = ing.ing;
      result[key] = (result[key] || 0) + amt;
    }
  }
  return result;
}

function renderChemDetail(c) {
  const det = document.getElementById('chem-detail');

  // Build intermediate steps
  const steps = [];
  function buildSteps(chem, depth) {
    if (depth > 5) return;
    for (const ing of chem.recipe) {
      if (ing.catalyst) continue;
      const sub = CHEMS.find(s => s.id === ing.ing || s.name.toLowerCase() === ing.ing.toLowerCase());
      if (sub && ing.inter && sub.recipe.length > 0) {
        buildSteps(sub, depth + 1);
        steps.push({ name: sub.name, heat: sub.heat, id: sub.id });
      }
    }
  }
  buildSteps(c, 0);
  const uniqueSteps = [...new Map(steps.map(s => [s.id, s])).values()];

  // Flatten to base elements
  const bases = flattenRecipe(c, 1, new Set());

  // Base elements HTML
  const baseHTML = Object.entries(bases).map(([ing, amt]) => {
    const inDisp = DISPENSER.has(ing.toLowerCase());
    const src = SOURCES[ing.toLowerCase()] || (inDisp ? 'dispenser' : 'other source');
    const rounded = Math.round(amt * 100) / 100;
    return `<div class="base-item ${inDisp ? 'dispenser' : 'not-dispenser'}">
      <div class="bi-name">${ing}</div>
      <div class="bi-amt">${rounded}u</div>
      <div class="bi-src">${inDisp ? '✓ dispenser' : '⚠ ' + src}</div>
    </div>`;
  }).join('');

  // Recipe steps HTML
  const stepsHTML = c.recipe.map(ing => {
    const sub = CHEMS.find(s => s.id === ing.ing || s.name.toLowerCase() === ing.ing.toLowerCase());
    const isInter = ing.inter && sub && sub.recipe.length > 0;
    return `<div class="rt-row${isInter ? ' intermediate' : ''}">
      <span class="rt-amt">${ing.amt}u</span>
      <span class="rt-arrow">→</span>
      <span class="rt-name">${ing.ing}${ing.catalyst ? ' <em style="color:var(--amber-l)">(catalyst)</em>' : ''}</span>
      ${isInter ? `<span class="rt-note">intermediate</span>` : ''}
    </div>`;
  }).join('');

  // Intermediate steps
  const interStepsHTML = uniqueSteps.length ? uniqueSteps.map(s => {
    const sub = CHEMS.find(x => x.id === s.id);
    if (!sub) return '';
    return `<div style="margin-bottom:8px">
      <div style="font-size:12px;font-weight:600;color:var(--amber-l);margin-bottom:4px;font-family:var(--mono)">${s.name}${s.heat ? ` — heat ${s.heat}` : ''}</div>
      ${sub.recipe.map(r => `<div class="rt-row" style="margin-bottom:3px"><span class="rt-amt">${r.amt}u</span><span class="rt-arrow">→</span><span class="rt-name">${r.ing}${r.catalyst?' <em style="color:var(--amber-l)">(catalyst)</em>':''}</span></div>`).join('')}
    </div>`;
  }).join('') : '';

  // Effects HTML
  const effHTML = c.effects.map(e => {
    const cls = e.t === 'heal' ? 'eff-heal' : e.t === 'dmg' ? 'eff-dmg' : 'eff-misc';
    const icon = e.t === 'heal' ? '+ ' : e.t === 'dmg' ? '✕ ' : '• ';
    return `<div class="eff-row ${cls}">${icon}${e.s}</div>`;
  }).join('');

  const odHTML = c.od && c.od !== 'none' ? `<div class="od-box">⚠ Overdose: ${c.od}</div>` : '';
  const heatHTML = c.heat ? `<div class="heat-box">🌡 Heat required: ${c.heat}</div>` : '';

  det.innerHTML = `
    <div class="cd-name">${c.name}</div>
    <div class="cd-meta">
      <span><span class="ci-cat ${CAT_CLS[c.cat]||'cat-misc'}">${CAT_LABELS[c.cat]||'MISC'}</span></span>
      ${c.abs ? `<span>⏱ ${c.abs} absorption</span>` : ''}
      ${c.od && c.od !== 'none' ? `<span style="color:var(--red-l)">⚠ OD: ${c.od}</span>` : '<span style="color:var(--green-l)">✓ No OD</span>'}
    </div>

    <div class="cd-section">
      <div class="cd-section-title">Effects</div>
      <div class="effects-list">${effHTML || '<div class="eff-misc">• No direct effects (intermediate substance)</div>'}</div>
      ${odHTML}${heatHTML}
    </div>

    <div class="cd-section">
      <div class="cd-section-title">Direct Recipe</div>
      <div class="recipe-tree">${stepsHTML || '<div style="color:var(--text3);font-size:13px">No synthesis recipe — obtained through other means</div>'}</div>
    </div>

    ${uniqueSteps.length ? `<div class="cd-section">
      <div class="cd-section-title">Intermediate Recipes (expand these first)</div>
      ${interStepsHTML}
    </div>` : ''}

    ${Object.keys(bases).length ? `<div class="cd-section">
      <div class="cd-section-title">Base Elements Needed (total, from dispenser)</div>
      <div class="base-grid">${baseHTML}</div>
    </div>` : ''}
  `;
}
